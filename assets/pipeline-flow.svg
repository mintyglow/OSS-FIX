<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 100" role="img" aria-label="Pipeline stages">
  <defs>
    <linearGradient id="box" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="s" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.25"/>
    </filter>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="720" height="100" fill="#f8fafc"/>
  <g font-family="system-ui,Segoe UI,sans-serif" font-size="11" fill="#334155">
    <rect x="8" y="22" width="130" height="56" rx="8" fill="url(#box)" filter="url(#s)" stroke="#334155" stroke-width="1"/>
    <text x="73" y="48" text-anchor="middle" fill="#e2e8f0" font-weight="600" font-size="12">Build</text>
    <text x="73" y="64" text-anchor="middle" fill="#94a3b8" font-size="10">Stage 1</text>
    <path d="M148 50 L168 50" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="178" y="22" width="130" height="56" rx="8" fill="url(#box)" filter="url(#s)" stroke="#334155" stroke-width="1"/>
    <text x="243" y="48" text-anchor="middle" fill="#e2e8f0" font-weight="600" font-size="12">Exploit</text>
    <text x="243" y="64" text-anchor="middle" fill="#94a3b8" font-size="10">Stage 2</text>
    <path d="M318 50 L338 50" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="348" y="22" width="130" height="56" rx="8" fill="url(#box)" filter="url(#s)" stroke="#334155" stroke-width="1"/>
    <text x="413" y="48" text-anchor="middle" fill="#e2e8f0" font-weight="600" font-size="12">Fixer</text>
    <text x="413" y="64" text-anchor="middle" fill="#94a3b8" font-size="10">Stage 3</text>
    <path d="M488 50 L508 50" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="518" y="22" width="130" height="56" rx="8" fill="url(#box)" filter="url(#s)" stroke="#475569" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="583" y="48" text-anchor="middle" fill="#cbd5e1" font-weight="600" font-size="12">Patch</text>
    <text x="583" y="64" text-anchor="middle" fill="#94a3b8" font-size="10">Stage 4 · opt</text>
    <text x="360" y="92" text-anchor="middle" fill="#64748b" font-size="10">docker commit ? · pipeline_result.json</text>
  </g>
